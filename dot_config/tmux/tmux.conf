# --- Color Variables ---

set -g @clr_active_bg "#89b4fa"
set -g @clr_active_fg "#11111b"
set -g @clr_inactive_bg "#313244"
set -g @clr_inactive_fg "#cdd6f4"
set -g @clr_bar_bg "#202020"

# --- Styling ---

# 1. Define the Active Pill (Inline colors override global styles)
#setw -g window-status-current-format "#[fg=#89b4fa,bg=default]#[fg=#11111b,bg=#89b4fa,bold]#I:#W#[fg=#89b4fa,bg=default]"
setw -g window-status-current-format "#[fg=#{@clr_active_bg},bg=default]🭨#[fg=#{@clr_active_fg},bg=#{@clr_active_bg},bold]#I:#W#[fg=#{@clr_active_bg},bg=default]🭬"

# 2. Define the Inactive Pill
#setw -g window-status-format "#[fg=#313244,bg=default]#[fg=#cdd6f4,bg=#313244]#I:#W#[fg=#313244,bg=default]"
setw -g window-status-format "#[fg=#{@clr_inactive_bg},bg=default]🭨#[fg=#{@clr_inactive_fg},bg=#{@clr_inactive_bg}]#I:#W#[fg=#{@clr_inactive_bg},bg=default]🭬"

# 3. Spacing and Alignment
#setw -g window-status-separator " "
setw -g window-status-separator ""
set -g status-justify left
set -g status-position top
#set -g status-style 'bg=default'
set -g status-style "bg=#{@clr_bar_bg}"

# 4. Status Content
set -g status-left-length 20
set -g status-left "#[fg=#{@clr_inactive_fg},bg=#{@clr_inactive_bg},bold]  #S #[fg=#{@clr_inactive_bg},bg=#{@clr_bar_bg}] "

set -g status-right-length 50
set -g status-right "#[fg=#{@clr_inactive_bg},bg=#{@clr_bar_bg}]#[fg=#{@clr_inactive_fg},bg=#{@clr_inactive_bg}] %Y-%m-%d #[fg=#{@clr_active_bg},bg=#{@clr_inactive_bg}]#[fg=#{@clr_active_fg},bg=#{@clr_active_bg},bold] %H:%M "

# --- Behavior ---

set -g mouse on
set -g prefix C-s

# Act like vim
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key -n S-Left previous-window
bind-key -n S-Right next-window

# Performance & Compatibility (Neovim suggestions)
set-option -sg escape-time 5
set-option -g focus-events on
set-option -a terminal-features 'foot:RGB'
